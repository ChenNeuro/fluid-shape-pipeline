project:
  seed: 20260302
  solver: synthetic

simulation:
  H: 1.0
  d_ratio: 0.2
  x0: 3.0
  y0: 0.5
  L_in: 5.0
  L_out: 5.0
  density: 1.0
  U_mean: 1.0
  re_values: [100, 200, 300]
  shapes: [circle, square, triangle]
  perturbations_per_combo: 5
  probes_n: 32
  workers: 0
  max_retries: 2

  perturb:
    enable_dy: true
    dy_min: -0.02
    dy_max: 0.02
    enable_eps: true
    eps_max: 0.02

  time:
    cfl_target: 0.5
    dt: 0.01
    transient_time: 8.0
    transient_cycles: 8
    min_cycles: 20
    min_samples: 2000

  synthetic:
    noise_std: 0.02
    shape_params:
      circle:
        st: 0.20
        amp: 0.18
        h2: 0.28
        h3: 0.08
        phase_gradient: 2.4
      square:
        st: 0.14
        amp: 0.22
        h2: 0.38
        h3: 0.22
        phase_gradient: 3.0
      triangle:
        st: 0.24
        amp: 0.16
        h2: 0.22
        h3: 0.14
        phase_gradient: 2.1

openfoam:
  template_dir: sim/templates/openfoam_case
  case_root: runs/openfoam
  mesh_cmds: [blockMesh]
  solver_cmd: pimpleFoam
  write_interval: 0.1

features:
  fft_bands: 6
  pod_modes: 5
  add_pod: true

ml:
  test_size: 0.2
  random_state: 42
  repeat_seeds: [40, 41, 42, 43, 44]
  n_estimators: 400
  cv_folds: 5
  robustness_bins: 6
  perm_repeats: 20

reconstruction:
  image_height: 64
  image_width: 128
  methods: [parametric_inverse, latent_ridge]
  param_n_estimators: 700
  audit_n_estimators: 350
  param_min_samples_leaf: 1
  latent_dim: 48
  ridge_alpha: 1.2
  obstacle_threshold: 0.8
  confidence_threshold: 0.45
  repeat_seeds: [40, 41, 42, 43, 44]
