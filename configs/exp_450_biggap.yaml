project:
  seed: 20260303
  solver: synthetic

simulation:
  H: 1.0
  d_ratio: 0.2
  x0: 3.0
  y0: 0.5
  L_in: 5.0
  L_out: 5.0
  density: 1.0
  U_mean: 1.0
  re_values: [100, 200, 300]
  shapes: [circle, triangle, airfoil, diamond, bar]
  perturbations_per_combo: 30
  probes_n: 32
  workers: 8
  max_retries: 2

  perturb:
    enable_dy: true
    dy_min: -0.05
    dy_max: 0.05
    enable_eps: true
    eps_max: 0.06

  time:
    cfl_target: 0.5
    dt: 0.01
    transient_time: 8.0
    transient_cycles: 8
    min_cycles: 20
    min_samples: 2000

  synthetic:
    noise_std: 0.036
    shape_params:
      circle:
        st: 0.17
        amp: 0.13
        h2: 0.16
        h3: 0.05
        phase_gradient: 1.8
      triangle:
        st: 0.30
        amp: 0.20
        h2: 0.34
        h3: 0.18
        phase_gradient: 3.3
      airfoil:
        st: 0.11
        amp: 0.09
        h2: 0.08
        h3: 0.03
        phase_gradient: 1.2
      diamond:
        st: 0.24
        amp: 0.18
        h2: 0.42
        h3: 0.27
        phase_gradient: 2.8
      bar:
        st: 0.07
        amp: 0.24
        h2: 0.58
        h3: 0.42
        phase_gradient: 4.0
    challenge:
      enabled: true
      freq_jitter_std: 0.08
      amp_jitter_std: 0.15
      noise_multiplier: 1.5
      common_mode_amp: 0.08
      common_mode_freq_ratio: 0.90
      drift_amp: 0.04
      drift_freq_ratio: 0.06
      probe_mix: 0.18
      dropout_prob: 0.006
      dropout_std: 0.07

openfoam:
  template_dir: sim/templates/openfoam_case
  case_root: runs/openfoam
  mesh_cmds: [blockMesh]
  solver_cmd: pimpleFoam
  write_interval: 0.1

features:
  fft_bands: 6
  pod_modes: 5
  add_pod: true

ml:
  test_size: 0.2
  random_state: 42
  repeat_seeds: [40, 41, 42, 43, 44]
  n_estimators: 500
  cv_folds: 5
  robustness_bins: 8
  perm_repeats: 20

reconstruction:
  image_height: 64
  image_width: 128
  methods: [parametric_inverse, latent_ridge]
  param_n_estimators: 1200
  audit_n_estimators: 450
  param_min_samples_leaf: 1
  latent_dim: 64
  ridge_alpha: 1.0
  obstacle_threshold: 0.8
  confidence_threshold: 0.45
  repeat_seeds: [40, 41, 42, 43, 44]
